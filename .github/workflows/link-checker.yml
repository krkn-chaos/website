name: "Python Documentation Link Checker"

on:
  pull_request:
    paths:
      - 'content/**/*.md'

jobs:
  check-links:
    runs-on: ubuntu-latest
    
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        # fetch-depth: 0 is required to get the git history for the diff
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate PR Diff
        # Creates a diff between the target branch (main) and the PR branch
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Run Diff-Based Link Checker
        run: python scripts/check_links.py

      - name: Check if Error Report Exists
        id: check_file
        run: |
          if [ -f "broken_links_report.md" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Post Warning Comment on PR
        if: steps.check_file.outputs.report_exists == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: broken_links_report.md
