name: ✨ Feature Request
description: Suggest a new feature or improvement for the Krkn website
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to see
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation content
        - Website UI/layout
        - Chatbot
        - Search
        - Developer experience
        - CI/CD
        - Other
    validations:
      required: true
