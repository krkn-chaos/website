name: Generate Monthly Digest

on:
  schedule:
    - cron: '0 0 1 * *' # 1st day of every month at midnight
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Fetch PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPOS: "krkn,krkn-hub,krknctl,krkn-operator,cerberus,krkn-ai"
        run: python scripts/fetch_prs.py

      - name: Generate Digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Create Blog Post and PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
        run: python scripts/create_blog_post.py
