name: Receive docs update dispatch + issue_comment /fix + /resync

on:
  repository_dispatch:
    types: [upstream_docs_change]
  issue_comment:
    types: [created]

jobs:
  # Event-driven bot (triggered by merged PR in krkn-hub)
  sync-docs:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Clone bot brain
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/StrikerEureka34/krkn-docs-bot.git _bot

      - name: Checkout krkn-hub (source of truth)
        uses: actions/checkout@v4
        with:
          repository: krkn-chaos/krkn-hub
          path: krkn-hub

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: pip install -r _bot/requirements.txt

      - name: Run doc bot (writes tab files to disk)
        id: run-bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          KRKN_HUB_PATH: krkn-hub
          WEBSITE_ROOT: .
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: PYTHONPATH=_bot python -m bot.doc_bot "$PAYLOAD"

      - name: Validate generated tab files have AUTO markers
        run: |
          python -c "
          from pathlib import Path
          import sys
          bad = [
              str(f) for f in Path('content').rglob('_tab-krkn-hub.md')
              if '<!-- AUTO:START' not in f.read_text()
          ]
          if bad:
              print('ERROR: missing AUTO markers in:', bad)
              sys.exit(1)
          print('OK: AUTO markers present in all generated tab files')
          "

      - name: Create draft PR with generated tab files
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          add-paths: content/
          draft: true
          title: "docs(bot): sync ${{ github.event.client_payload.scenario }} params from krkn-hub#${{ github.event.client_payload.pr_number }}"
          body: |
            ## Documentation Update

            **Triggered by:** krkn-hub PR #${{ github.event.client_payload.pr_number }} - "${{ github.event.client_payload.pr_title }}"

            **Changes generated:**
            | Type | Count |
            |------|-------|
            | Parameters added | ${{ steps.run-bot.outputs.params_added }} |
            | Defaults corrected | ${{ steps.run-bot.outputs.params_corrected }} |
            | Parameters removed | ${{ steps.run-bot.outputs.params_removed }} |
            | Tab files written | ${{ steps.run-bot.outputs.tabs_written }} |

            Please review the generated parameter tables for accuracy before merging.

            Comment `/resync` to re-run the doc generation with the latest context.

            ---
            *Generated by krkn-docs-bot.*

            <!-- krkn-bot:scenario=${{ github.event.client_payload.scenario }} -->
          branch: docs/sync-${{ github.event.client_payload.scenario }}-${{ github.run_id }}
          labels: docs-bot

  # Interactive /fix command (triggered by issue comment)
  issue-comment-fix:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@krkn-docs-bot /fix') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Clone bot brain
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/StrikerEureka34/krkn-docs-bot.git _bot

      - name: Checkout krkn-hub
        uses: actions/checkout@v4
        with:
          repository: krkn-chaos/krkn-hub
          path: krkn-hub

      - name: Extract scenario name from comment
        id: parse
        run: |
          SCENARIO=$(echo "${{ github.event.comment.body }}" \
            | grep -oP '@krkn-docs-bot /fix \K[a-z0-9-]+')
          echo "scenario=$SCENARIO" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: pip install -r _bot/requirements.txt

      - name: Run doc bot in targeted mode
        id: run-bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          KRKN_HUB_PATH: krkn-hub
          WEBSITE_ROOT: .
        run: PYTHONPATH=_bot python -m bot.doc_bot --scenario "${{ steps.parse.outputs.scenario }}"

      - name: Create draft PR for fixed scenario
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          add-paths: content/
          draft: true
          title: "docs(bot): fix drift for ${{ steps.parse.outputs.scenario }}"
          body: |
            Targeted documentation fix for `${{ steps.parse.outputs.scenario }}` triggered by:
            > ${{ github.event.comment.html_url }}

            **Changes:** +${{ steps.run-bot.outputs.params_added }} added, ~${{ steps.run-bot.outputs.params_corrected }} corrected, -${{ steps.run-bot.outputs.params_removed }} removed

            Please review the generated parameter table before merging.
          branch: docs/fix-${{ steps.parse.outputs.scenario }}-${{ github.run_id }}
          labels: docs-bot

  # Interactive /resync command (triggered by PR comment)
  issue-comment-resync:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/resync') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Acknowledge regeneration request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            -f body="Regenerating documentation... Please wait."

      - name: Get PR branch and extract scenario from PR body
        id: pr-info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          BODY=$(echo "$PR_DATA" | jq -r '.body')
          SCENARIO=$(echo "$BODY" | grep -oP '<!-- krkn-bot:scenario=\K[^ ]+(?= -->)')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "scenario=$SCENARIO" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.pr-info.outputs.branch }}

      - name: Clone bot brain
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/StrikerEureka34/krkn-docs-bot.git _bot

      - name: Checkout krkn-hub
        uses: actions/checkout@v4
        with:
          repository: krkn-chaos/krkn-hub
          path: krkn-hub

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: pip install -r _bot/requirements.txt

      - name: Run doc bot for regeneration
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          KRKN_HUB_PATH: krkn-hub
          WEBSITE_ROOT: .
        run: PYTHONPATH=_bot python -m bot.doc_bot --scenario "${{ steps.pr-info.outputs.scenario }}"

      - name: Commit regenerated content to PR branch
        run: |
          git config user.name "krkn-docs-bot[bot]"
          git config user.email "${{ secrets.APP_ID }}+krkn-docs-bot[bot]@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -s -m "docs(bot): regenerate ${{ steps.pr-info.outputs.scenario }} via /resync"
          git push

      - name: Post success comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --method POST \
            -f body="Documentation regenerated successfully. Please review the updated diff."
